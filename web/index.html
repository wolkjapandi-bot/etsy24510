<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>和モダンAIポスター | 公開ギャラリー</title>
    <style>
      :root { --bg:#f7f5f1; --text:#1f1f1f; --muted:#666; --card:#fff; --line:#e9e3d8; }
      * { box-sizing: border-box; }
      body { margin:0; font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans JP",sans-serif; background:var(--bg); color:var(--text); }
      header { padding:48px 24px 20px; text-align:center; }
      h1 { margin:0; font-size:clamp(1.8rem,4vw,2.6rem); letter-spacing:.05em; }
      .lead { max-width:760px; margin:16px auto 0; color:var(--muted); line-height:1.7; }
      main { max-width:1100px; margin:0 auto; padding:16px 24px 56px; }
      .controls { display:flex; gap:10px; flex-wrap:wrap; margin:18px 0 22px; }
      .btn { border:1px solid #444; background:#222; color:#fff; padding:10px 14px; border-radius:10px; text-decoration:none; font-size:.92rem; }
      .btn.secondary { background:transparent; color:#222; }
      .grid { display:grid; grid-template-columns: repeat(auto-fill,minmax(220px,1fr)); gap:16px; }
      .card { background:var(--card); border:1px solid var(--line); border-radius:14px; padding:12px; box-shadow:0 2px 10px rgba(0,0,0,.04); }
      .thumb { width:100%; aspect-ratio:4/5; object-fit:cover; background:#ddd; border-radius:10px; }
      .meta { margin-top:10px; font-size:.85rem; color:var(--muted); }
      footer { text-align:center; font-size:.82rem; color:#777; padding:24px; }
      .notice { background:#fff7df; border:1px solid #f0dfaa; padding:10px 12px; border-radius:10px; color:#5f4a10; margin:16px 0; }
    </style>
  </head>
  <body>
    <header>
      <h1>Japandi × 禅 × 詫び寂び<br/>公開ギャラリーページ</h1>
      <p class="lead">
        生成されたデジタルポスター作品を公開するページです。Google Driveへ保存済みのリンクまたはローカル画像を一覧表示できます。
      </p>
    </header>

    <main>
      <div class="controls">
        <a class="btn" href="#" id="loadManifestBtn">manifest.json を読み込む</a>
        <a class="btn secondary" href="../docs/run_60_generation.md" target="_blank" rel="noopener">実行手順を見る</a>
      </div>

      <div class="notice">
        表示するには、`generated/manifest.json` を作成した状態でこのページを開いてください。
      </div>

      <section class="grid" id="gallery"></section>
    </main>

    <footer>
      © AI Poster Automation Showcase
    </footer>

    <script>
      const gallery = document.getElementById('gallery');
      const loadManifestBtn = document.getElementById('loadManifestBtn');

      function cardTemplate(item) {
        const src = item.drive_link || item.file || '';
        const detail = (item.prompt || '').slice(0, 120);
        return `
          <article class="card">
            <img class="thumb" src="${src}" alt="poster-${item.index || ''}" loading="lazy" />
            <div class="meta">#${item.index || '-'} ${detail}</div>
          </article>
        `;
      }

      async function loadManifest() {
        try {
          const response = await fetch('../generated/manifest.json', { cache: 'no-store' });
          if (!response.ok) throw new Error('manifest not found');
          const items = await response.json();
          gallery.innerHTML = items.map(cardTemplate).join('');
        } catch (e) {
          gallery.innerHTML = '<p>manifest.json を読み込めませんでした。先に生成スクリプトを実行してください。</p>';
        }
      }

      loadManifestBtn.addEventListener('click', (event) => {
        event.preventDefault();
        loadManifest();
      });

      loadManifest();
    </script>
  </body>
</html>
